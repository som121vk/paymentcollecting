<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>
    <!-- Basic SEO tags -->
    <meta name="description" content="Secure payment collection gateway.">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo=">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="payment-container">
        <header class="payment-header">
            <div class="icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2>Secure Checkout</h2>
            <p>Please fill your details to proceed with the payment.</p>
        </header>

        <!-- Visible Form for User Input -->
        <form id="uiPaymentForm" class="payment-form">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe" required>
                <span class="error-message" id="nameError">Please enter your full name.</span>
            </div>

            <div class="form-group">
                <label for="mobileNumber">Mobile Number</label>
                <div class="input-with-prefix">
                    <span class="prefix">+91</span>
                    <input type="tel" id="mobileNumber" placeholder="9876543210" pattern="[0-9]{10}" maxlength="10" required>
                </div>
                <span class="error-message" id="mobileError">Please enter a valid 10-digit mobile number.</span>
            </div>

            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" id="amount" placeholder="100" min="1" step="1" required>
                <span class="error-message" id="amountError">Minimum amount is ₹1.</span>
            </div>

            <div class="form-group captcha-group">
                <label>Security Check</label>
                <div class="captcha-container">
                    <span id="captchaQuestion" class="captcha-question">... + ... =</span>
                    <input type="number" id="captchaAnswer" placeholder="?" required>
                </div>
                <span class="error-message" id="captchaError">Incorrect answer. Please try again.</span>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">
                <span class="btn-text">Proceed to Pay</span>
                <span class="spinner" style="display: none;"></span>
            </button>
        </form>

        <!-- Hidden Form for PayU Submission -->
        <form action="https://test.payu.in/_payment" method="post" id="payuForm" style="display: none;">
            <input type="hidden" name="key" id="payu_key" value="" />
            <input type="hidden" name="txnid" id="payu_txnid" value="" />
            <input type="hidden" name="amount" id="payu_amount" value="" />
            <input type="hidden" name="productinfo" id="payu_productinfo" value="Payment Collection" />
            <input type="hidden" name="firstname" id="payu_firstname" value="" />
            <input type="hidden" name="email" id="payu_email" value="" />
            <input type="hidden" name="phone" id="payu_phone" value="" />
            <input type="hidden" name="surl" id="payu_surl" value="" />
            <input type="hidden" name="furl" id="payu_furl" value="" />
            <input type="hidden" name="hash" id="payu_hash" value="" />
        </form>
    </div>

    <!-- Instructions note for developers -->
    <!-- 
      SECURITY BEST PRACTICES:
      1. This implementation handles hashing on the client side strictly for demonstration and GitHub Pages compatibility.
      2. In a production environment, NEVER expose your `merchant key` or `salt` on the client side. 
         Hash generation MUST be done on a secure backend server.
      3. Use PayU testing environment details for safe testing.
    -->
    <script src="assets/js/script.js"></script>
</body>
</html>
