<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="result-page">
    <div class="result-card success-card">
        <div class="result-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none"
                stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>
        <h1>Payment Successful!</h1>
        <p>Thank you for your payment. Your transaction has been completed successfully.</p>

        <div class="transaction-details" id="txDetails">
            <!-- Details will be populated by JS from URL params -->
        </div>

        <a href="index.html" class="btn btn-outline">Back to Home</a>
    </div>

    <script>
        // Extract parameters from URL if any are passed back by PayU (or we can just show static success)
        // Usually PayU POSTs to success URL, so GitHub Pages (which only handles GET) might not receive POST data correctly.
        // For static hosting, we just display the confirmation.
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const txnid = urlParams.get('txnid') || 'TXN-' + Math.floor(Math.random() * 1000000000);

            const detailsHtml = `
                <div class="detail-row">
                    <span class="detail-label">Transaction ID:</span>
                    <span class="detail-value">${txnid}</span>
                </div>
            `;
            document.getElementById('txDetails').innerHTML = detailsHtml;
        });
    </script>
</body>

</html>
